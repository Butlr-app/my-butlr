<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Butlr — Offline</title>
    <style>
      :root { color-scheme: dark; }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0A0A0A;
        color: #FAFAFA;
        padding: 24px;
        text-align: center;
      }
      .card { max-width: 360px; }
      .badge {
        width: 64px; height: 64px; border-radius: 16px;
        background: #FAFAFA; color: #0A0A0A;
        display: flex; align-items: center; justify-content: center;
        font-size: 36px; font-weight: 700; margin: 0 auto 20px;
      }
      h1 { font-size: 20px; font-weight: 700; margin: 0 0 8px; }
      p { font-size: 14px; line-height: 1.5; color: #A1A1AA; margin: 0 0 24px; }
      button {
        font: inherit; font-weight: 600; font-size: 14px;
        background: #FAFAFA; color: #0A0A0A;
        border: 0; border-radius: 8px; padding: 10px 20px; cursor: pointer;
      }
      button:hover { opacity: 0.9; }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="badge">b</div>
      <h1>You're offline</h1>
      <p>My Butlr can't reach the network right now. Check your connection and try again — your data will sync once you're back online.</p>
      <button onclick="location.reload()">Retry</button>
    </div>
  </body>
</html>
